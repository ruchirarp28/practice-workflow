name: Get Latest Commit From Another Repo Branch

on:
  workflow_dispatch:
    inputs:
      branch:
        description: "Branch name of target repo"
        required: true
        default: "main"

jobs:
  get-commit:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout other repo
        uses: actions/checkout@v4
        with:
          repository: ${{ github.repository_owner }}/dependency-repo
          ref: ${{ github.event.inputs.branch }}

      - name: Print commit id
        run: git rev-parse HEAD