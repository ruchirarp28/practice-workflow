name: Get Latest Commit From Another Repo Branch

on:
  workflow_dispatch:
    inputs:
      branch:
        description: "Branch name of target repo"
        required: true
        default: "main"

jobs:
  get-commit:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout other repo
        uses: actions/checkout@v4
        with:
          repository: ${{ github.repository_owner }}/dependency-repo
          ref: ${{ github.event.inputs.branch }}

      - name: Get short commit SHA
        id: getsha
        run: |
          SHORT_SHA=$(git rev-parse --short HEAD)
          echo "short_sha=$SHORT_SHA" >> "$GITHUB_OUTPUT"

  use-commit:
    runs-on: ubuntu-latest
    needs: get-commit

    steps:
      - name: Print commit
        run: echo "Commit from previous job: ${{ needs.get-commit.outputs.short_sha }}"