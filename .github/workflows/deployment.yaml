name: Get Commit And Use Later

on:
  workflow_dispatch:
    inputs:
      branch:
        description: Branch name
        required: true
        default: main

jobs:
  get-commit:
    runs-on: ubuntu-latest

    outputs:
      short_sha: ${{ steps.getsha.outputs.short_sha }}

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4
        with:
          repository: ${{ github.repository_owner }}/dependency-repo
          ref: ${{ github.event.inputs.branch }}

      - name: Get short commit SHA
        id: getsha
        run: |
          SHORT_SHA=$(git rev-parse --short HEAD)
          echo "short_sha=$SHORT_SHA" >> "$GITHUB_OUTPUT"

  use-commit:
    runs-on: ubuntu-latest
    needs: get-commit

    steps:
      - name: Print commit
        run: |
          echo "Commit from previous job: ${{ needs.get-commit.outputs.short_sha }}"