name: No-op Merge on PR Merge to Dev or Release

on:
  pull_request_target:
    types: [closed]
    branches:
      - dev
      - 'release/*'

jobs:
  post-merge-job:
    # Only run if PR was merged
    if: github.event.pull_request.merged == true
    runs-on: ubuntu-latest
    permissions:
      contents: read  # No push or PR creation required

    steps:
      - name: Skip if PR is from a no-op branch
        if: startsWith(github.event.pull_request.head.ref, 'no-op-merge/')
        run: |
          echo "PR is from a no-op merge branch. Skipping workflow."
          exit 0

      - name: Checkout target branch
        uses: actions/checkout@v4
        with:
          ref: ${{ github.event.pull_request.base.ref }}
          fetch-depth: 0
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Setup Git identity
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"

      - name: Create and push no-op branch
        run: |
          NOOP_BRANCH="no-op-merge/${{ github.event.pull_request.number }}"
          TARGET_BRANCH="${{ github.event.pull_request.base.ref }}"

          echo "Creating local branch $NOOP_BRANCH from $TARGET_BRANCH"

          # Checkout target branch
          git checkout $TARGET_BRANCH

          # Create new branch
          git checkout -b $NOOP_BRANCH

          # Push new branch to remote
          git push origin $NOOP_BRANCH

          echo "Branch $NOOP_BRANCH created and pushed. Admin can manually create a PR."

